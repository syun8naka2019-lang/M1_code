// ===== HIT =====
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ===== SHOOT =====------------------------------------
function shootBullet(){
  let px = player.x + player.w/2;
  let py = player.y + player.h/2;
  let dx = mouseX - px;
  let dy = mouseY - py;
  let len = Math.sqrt(dx*dx+dy*dy);
  if(len===0) return;
  let speed = 10;
  bullets.push({x:px, y:py, vx:dx/len*speed, vy:dy/len*speed, w:8, h:8});
}
//save-----------------------------------------------------2026/21:46
function saveGame(){
  if(!saveEnabled) return;
  let data = {
    wx, wy,
    player,
    world
  };
  try {
    localStorage.setItem("metroidSave", JSON.stringify(data));
    hasSave = true;
    saveMessage = "SAVED!";
    saveTimer = 120;
  } catch(e) {
    saveEnabled = false;
  }
}

function loadGame(){
  if(!saveEnabled) return;
  let data;
  try {
    data = localStorage.getItem("metroidSave");
  } catch(e) {
    saveEnabled = false;
    return;
  }

  if(data){
    let d = JSON.parse(data);
    wx = Math.min(size-1, Math.max(0, d.wx || 0));

// HPバー描画関数
function drawHpBar(e, color = "red", maxHp = 2) {
  ctx.fillStyle = "black";
  ctx.fillRect(e.x, e.y - 5, e.w, 4);
  ctx.fillStyle = color;
  ctx.fillRect(e.x, e.y - 5, e.w * (e.hp / maxHp), 4);
}

function drawEnemies(){
  if(state!=="game") return;
  let roomType = world[wy][wx].type;
  let er = enemies[roomType];
  if(!er) return;

  // ===== 雷描画 =====
  for(let t of thunders){
    if(t.timer > 30){
      ctx.strokeStyle = "red";
      ctx.beginPath();
      ctx.moveTo(t.x, 0);
      ctx.lineTo(t.x, 600);
      ctx.stroke();
    } else {
      ctx.strokeStyle = "cyan";
      ctx.lineWidth = 3;
      ctx.beginPath();
      let y = 0;
      ctx.moveTo(t.x, y);
      while(y < 600){
        let nx = t.x + (Math.random()*30-15);
        let ny = y + 40;
        ctx.lineTo(nx, ny);
        y = ny;
      }
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  // 敵のデザイン
  for(let e of er){
    // ★ 地上では地下の敵描画しない
    if(roomType === "jungle" && player.y <= 600){
      if(e.y > 600) continue;
    }
    if(e.type==="normal"||e.type==="hoverCrab"){
      ctx.fillStyle="red";
      ctx.beginPath();
      let w = e.w, h = e.h;
      ctx.ellipse(e.x+w/2, e.y+h/2, w/2, h/2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillRect(e.x-5, e.y+h/4, 10, 3);
      ctx.fillRect(e.x+w-5, e.y+h/4, 10, 3);
      for(let i=0;i<4;i++){
        ctx.fillRect(e.x+i*5, e.y+h-2, 4, 2);
        ctx.fillRect(e.x+w-4-i*5, e.y+h-2, 4, 2);
      }
      drawHpBar(e, "lime", 2);
    }
    else if(e.type==="fly"||e.type==="crazyFly"||e.type==="crazyFly2"){
      ctx.fillStyle="cyan";
      ctx.beginPath();
      let cx = e.x + e.w/2;
      let cy = e.y + e.h/2;
      let r = e.w * 1.5;
      for(let i=0;i<10;i++){
        let a = i * 2*Math.PI/10;
        let radius = (i%2===0)? r : r*0.6;
        ctx.lineTo(cx + Math.cos(a)*radius, cy + Math.sin(a)*radius);
      }
      ctx.closePath();
      ctx.fill();
      drawHpBar(e, "orange", 2);
    }
    else if(roomType==="factory"){
      ctx.save();
      ctx.translate(e.x+e.w/2,e.y+e.h/2);
      e.angle=(e.angle||0)+0.02;
      ctx.rotate(e.angle);
      ctx.fillStyle="cyan";
      ctx.beginPath();
      for(let i=0;i<5;i++){let a=i*2*Math.PI/5; ctx.lineTo(Math.cos(a)*40,Math.sin(a)*40);}
      ctx.closePath(); ctx.fill();
      ctx.fillStyle="magenta"; ctx.fillRect(-20,-20,40,40);
      ctx.fillStyle="red"; ctx.fillRect(-20,-50,40*(e.hp/2),5);
      ctx.restore();
    }
    else if(roomType==="jungle"){
      ctx.fillStyle="lime";
      ctx.beginPath();
      ctx.arc(e.x+e.w/2, e.y+e.h/2, e.w/2, 0, Math.PI*2);
      ctx.fill();
      drawHpBar(e, "red", 2);
    }
    else if(roomType==="sky"){
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.moveTo(e.x+e.w/2, e.y);
      ctx.lineTo(e.x+e.w, e.y+e.h/2);
      ctx.lineTo(e.x+e.w/2, e.y+e.h);
      ctx.lineTo(e.x, e.y+e.h/2);
      ctx.closePath();
      ctx.fill();
      drawHpBar(e, "red", 2);
    }
    else {
      ctx.fillStyle="red";
      ctx.fillRect(e.x,e.y,e.w,e.h);
      drawHpBar(e, "red", 2);
